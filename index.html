<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            background: #000; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* La Isla Dinámica */
        #dynamic-island {
            margin-top: 20px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Contenedor que ocupa toda la pantalla para centrar el grid */
        #app-grid {
            display: grid; 
            grid-template-columns: repeat(4, 1fr);
            gap: 30px; 
            padding: 50px; 
            width: 100%;
            max-width: 600px;
            margin-top: 50px;
        }

        .app-icon {
            width: 80px; 
            height: 80px; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            color: white; 
            font-weight: 500; 
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

    <div id="dynamic-island">Conectado</div>

    <div id="app-grid">
        <div class="app-icon">YT</div>
        <div class="app-icon">MSG</div>
        <div class="app-icon">MAP</div>
        <div class="app-icon">SET</div>
        <div class="app-icon">CAM</div>
        <div class="app-icon">MUS</div>
        <div class="app-icon">GAL</div>
        <div class="app-icon">CAL</div>
    </div>

</body>
</html>
