<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            /* Fondo tipo iOS 26 */
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); 
            height: 100vh; 
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Área de Widgets */
        #widget-area { margin-top: 30px; width: 90%; height: 150px; background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); border-radius: 30px; }

        /* Dock Inferior */
        #dock {
            margin-top: auto; width: 400px; height: 90px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px);
            border-radius: 30px; display: flex; justify-content: space-around; align-items: center;
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .dock-icon { width: 60px; height: 60px; background: rgba(255,255,255,0.5); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="widget-area"></div>

    <div id="dock">
        <div class="dock-icon" onclick="alert('Abriendo Safari...')">🌐</div>
        <div class="dock-icon" onclick="alert('Abriendo Musica...')">🎵</div>
        <div class="dock-icon" onclick="alert('Abriendo Settings...')">⚙️</div>
    </div>

</body>
</html>
