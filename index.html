<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS Liquid Glass Pro</title>
    <style>
        body { 
            margin: 0; height: 100vh; background: #000;
            background: url('https://wallpapercg.com/download/ios-26-carplay-stock-wallpaper--32005.jpg') center/cover;
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        .time-container {
            margin-top: 40px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px); border-radius: 20px;
            padding: 15px 30px; color: white;
            font-size: 60px; font-weight: 500;
            font-stretch: ultra-condensed;
            letter-spacing: -2px; border: 1px solid rgba(255,255,255,0.2);
        }

        .app-grid { display: flex; gap: 20px; margin-top: 30px; }
        .app-icon { width: 70px; height: 70px; background-size: cover; border-radius: 18px; cursor: pointer; transition: 0.2s; }
        .app-icon:hover { transform: scale(1.1); }

        .dock {
            position: absolute; bottom: 30px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px); padding: 15px 25px; border-radius: 30px;
            display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="time-container" id="clock">02:54 p. m.</div>

    <!-- Apps principales -->
    <div class="app-grid">
        <div class="app-icon" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg');" onclick="window.open('https://youtube.com', '_blank')"></div>
        <div class="app-icon" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/4e/Mail_%28iOS%29.svg');" onclick="window.open('https://mail.google.com', '_blank')"></div>
        <div class="app-icon" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8TCZwCFV_XrLwzIPhScY5x-j7ymq7HxL5mg&s');" onclick="window.open('https://photos.google.com', '_blank')"></div>
        <div class="app-icon" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/App_Store_%28iOS%29.svg/960px-App_Store_%28iOS%29.svg.png');" onclick="window.open('https://apps.apple.com', '_blank')"></div>
    </div>

    <!-- Dock con las apps adicionales -->
    <div class="dock">
        <div class="app-icon" style="background-image: url('https://cdn.iconscout.com/icon/free/png-256/free-apple-itunes-store-icon-svg-download-png-493149.png');" onclick="window.open('https://music.apple.com', '_blank')"></div>
        <div class="app-icon" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRf9g_m5t3k--Z3Ijq56apjT-NYCbQmlfyKg&s');" onclick="window.open('https://icloud.com', '_blank')"></div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-HN', { hour: '2-digit', minute:'2-digit', hour12: true });
            document.getElementById('clock').innerText = timeStr.toLowerCase();
        }
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
