<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS 26 - Home Screen</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            background: url('https://w.wallhaven.cc/full/2e/wallhaven-2e8qxl.jpg') center/cover;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .dock {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            padding: 12px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .icon { 
            width: 65px; height: 65px; border-radius: 18px; 
            cursor: pointer; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: rgba(255,255,255,0.1);
        }
        .icon:hover { transform: translateY(-10px); }
        .icon img { width: 100%; height: 100%; object-fit: cover; }

        .window {
            position: absolute; top: 10%; left: 10%; width: 500px; height: 400px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.5);
            display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="dock">
        <div class="icon" onclick="openApp('Safari')"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png"></div>
        <div class="icon" onclick="openApp('Fotos')"><img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png"></div>
        <div class="icon" onclick="openApp('Música')"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png"></div>
        <div class="icon" onclick="openApp('Ajustes')"><img src="https://cdn-icons-png.flaticon.com/512/665/665049.png"></div>
    </div>

    <script>
        function openApp(name) {
            const win = document.createElement('div');
            win.className = 'window';
            win.innerHTML = `<div style="padding:15px; border-bottom: 1px solid #ccc;">${name} <button onclick="this.parentElement.parentElement.remove()">Cerrar</button></div>
                             <div style="padding:20px;">Esta es la app de ${name} funcionando.</div>`;
            document.body.appendChild(win);
        }
    </script>
</body>
</html>
