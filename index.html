<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            /* Si la imagen falla, esto mostrará un color de fondo para que veas que el código sirve */
            background: #2a2a2a; 
            font-family: sans-serif;
        }

        .dock {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; gap: 15px;
        }

        .app { width: 60px; height: 60px; background: #555; border-radius: 14px; }
    </style>
</head>
<body>

    <div class="dock">
        <div class="app"></div>
        <div class="app"></div>
        <div class="app"></div>
    </div>

</body>
</html>
