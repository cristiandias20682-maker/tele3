<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS Clone</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg, #007AFF, #5AC8FA); height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; margin-top: 50px; }
        .app { text-align: center; cursor: pointer; color: white; transition: 0.3s; }
        .icon { width: 80px; height: 80px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal { display: none; position: fixed; inset: 5%; background: white; border-radius: 30px; padding: 20px; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="grid">
    <div class="app" onclick="abrir('YouTube')"><div class="icon">▶️</div><div>YouTube</div></div>
    <div class="app" onclick="abrir('Fotos')"><div class="icon">📸</div><div>Fotos</div></div>
    <div class="app" onclick="abrir('Musica')"><div class="icon">🎵</div><div>Música</div></div>
    <div class="app" onclick="abrir('Config')"><div class="icon">⚙️</div><div>Ajustes</div></div>
</div>

<div id="modal" class="modal">
    <button onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
    <div id="contenido"></div>
</div>

<script>
    function abrir(app) {
        let contenido = "";
        if(app === 'YouTube') contenido = "<h1>YouTube</h1><p>Aquí verías tus videos.</p>";
        if(app === 'Fotos') contenido = "<h1>Fotos</h1><p>Tu galería de imágenes.</p>";
        if(app === 'Musica') contenido = "<h1>Música</h1><p>Tu reproductor de canciones.</p>";
        if(app === 'Config') contenido = "<h1>Ajustes</h1><p>Configura tu dispositivo.</p>";
        
        document.getElementById('contenido').innerHTML = contenido;
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
