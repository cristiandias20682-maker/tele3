<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: url('https://i.imgur.com/your-wallpaper.jpg') center/cover; height: 100vh; display: flex; flex-direction: column; }
        
        /* Dock Inferior (Liquid Glass) */
        #dock {
            margin-top: auto; width: 80%; height: 90px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px);
            border-radius: 30px; display: flex; justify-content: space-around; align-items: center;
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Widgets y Grid */
        #main-area { display: flex; flex-direction: column; padding: 20px; }
        .widget { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; width: 300px; }
        
        .icon { width: 60px; height: 60px; background: #fff; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-area">
        <div class="widget">Widgets (Clima, Calendario)</div>
    </div>

    <div id="dock">
        <div class="icon" onclick="openApp('Safari')">Safari</div>
        <div class="icon" onclick="openApp('Musica')">Musica</div>
        <div class="icon" onclick="openApp('Settings')">Settings</div>
    </div>

    <script>
        function openApp(name) {
            alert("Abriendo " + name + "...");
            // Aquí añadiremos la lógica para cambiar el contenido de la pantalla
        }
    </script>
</body>
</html>
