<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS 26 Desktop</title>
    <style>
        /* Estilos Liquid Glass Originales */
        :root { --glass: rgba(255, 255, 255, 0.15); }
        body { margin: 0; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif;
               background: linear-gradient(135deg, #007AFF, #5AC8FA); display: flex; flex-direction: column; align-items: center; }
        
        .desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 30px; margin-top: 100px; width: 80%; }
        
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .app:hover { transform: scale(1.15); }
        
        .glass-icon { width: 90px; height: 90px; background: var(--glass); backdrop-filter: blur(20px);
                      border-radius: 25px; border: 1px solid rgba(255,255,255,0.3);
                      display: flex; align-items: center; justify-content: center; font-size: 45px;
                      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }
        
        .label { color: white; margin-top: 10px; font-weight: 500; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="desktop">
        <div class="app" onclick="window.open('https://www.youtube.com', '_blank')">
            <div class="glass-icon">▶️</div><div class="label">YouTube</div>
        </div>
        <div class="app" onclick="window.open('https://www.icloud.com', '_blank')">
            <div class="glass-icon">📧</div><div class="label">Mail</div>
        </div>
        <div class="app" onclick="window.open('https://www.icloud.com/photos', '_blank')">
            <div class="glass-icon">📸</div><div class="label">Fotos</div>
        </div>
        <div class="app" onclick="window.open('https://www.icloud.com/notes', '_blank')">
            <div class="glass-icon">📝</div><div class="label">Notas</div>
        </div>
        <div class="app" onclick="window.open('https://music.apple.com', '_blank')">
            <div class="glass-icon">🎵</div><div class="label">Música</div>
        </div>
        <div class="app" onclick="window.open('https://www.google.com', '_blank')">
            <div class="glass-icon">🌐</div><div class="label">Safari</div>
        </div>
    </div>

    <script>
        // Los iconos funcionan instantáneamente con enlaces web reales.
        console.log("Interfaz Liquid Glass cargada correctamente.");
    </script>
</body>
</html>
