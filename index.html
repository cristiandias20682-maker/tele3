<!DOCTYPE html>
<html>

    <style>
        body { 
            margin: 0; 
            /* Fondo de pantalla de alta calidad integrado directamente en el código */
            background: url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            font-family: sans-serif; 
        }
        .dock { 
            background: rgba(255, 255, 255, 0.2); 
            padding: 15px; 
            border-radius: 30px; 
            display: flex; 
            gap: 20px; 
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .icon { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
        svg { width: 45px; height: 45px; }
    </style>
</head>
