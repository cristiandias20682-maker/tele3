<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS Liquid Glass Pro</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.15); --blur: blur(25px); }
        body { margin: 0; height: 100vh; background: linear-gradient(135deg, #007AFF, #5AC8FA); 
               display: flex; flex-direction: column; align-items: center; justify-content: space-between; font-family: sans-serif; }

        /* Isla Dinámica */
        #island { width: 150px; height: 40px; background: black; border-radius: 25px; margin-top: 15px; 
                  display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: 0.5s; }
        #island:hover { width: 300px; height: 100px; border-radius: 40px; }

        /* Iconos SVG (Ruta configurada) */
        .icon { width: 85px; height: 85px; background-repeat: no-repeat; background-size: contain; cursor: pointer; transition: 0.3s; }
        .icon:hover { transform: scale(1.15); }
        
        .desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 40px; width: 80%; }
        
        .dock { background: var(--glass); backdrop-filter: var(--blur); padding: 20px 40px; border-radius: 40px; 
                margin-bottom: 30px; display: flex; gap: 30px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="island">iPadOS Pro</div>

    <div class="desktop">
        <div class="icon" style="background-image: url('iconos/youtube.svg');" onclick="window.open('https://youtube.com', '_blank')"></div>
        <div class="icon" style="background-image: url('iconos/fotos.svg');" onclick="window.open('https://photos.google.com', '_blank')"></div>
        <div class="icon" style="background-image: url('iconos/mail.svg');" onclick="window.open('https://icloud.com', '_blank')"></div>
    </div>

    <div class="dock">
        <div class="icon" style="background-image: url('iconos/safari.svg');"></div>
        <div class="icon" style="background-image: url('iconos/music.svg');"></div>
        <div class="icon" style="background-image: url('iconos/settings.svg');"></div>
    </div>

</body>
</html>
