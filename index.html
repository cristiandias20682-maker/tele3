<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPadOS 26 - Build 26.0.0.1</title>
    <style>
        /* [BLOQUE DE ESTILOS - COMPLEJIDAD ALTA] */
        * { box-sizing: border-box; }
        body { margin:0; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; user-select: none; }
        #os-root { width: 100vw; height: 100vh; position: relative; background: linear-gradient(to bottom, #111, #000); }
        
        /* Sistema de Cuadrícula de Apps */
        #grid-container { display: grid; grid-template-columns: repeat(6, 1fr); padding: 60px; gap: 40px; }
        .app-icon { width: 90px; height: 90px; background: rgba(255,255,255,0.05); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; transition: 0.2s; }
        .app-icon:hover { transform: scale(1.05); background: rgba(255,255,255,0.1); }
        
        /* Ventanas de Aplicación (Gestor de Ventanas) */
        .window-manager { position: absolute; top: 5%; left: 5%; width: 90%; height: 85%; background: #fff; border-radius: 30px; display: none; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8); z-index: 999; }
        .win-header { height: 50px; background: #f0f0f0; display: flex; align-items: center; padding: 0 20px; font-weight: bold; cursor: grab; }
        
        /* Dock */
        #os-dock { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px; background: rgba(255,255,255,0.1); backdrop-filter: blur(40px); border-radius: 40px; display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="os-root">
        <div id="grid-container">
            <div class="app-icon" onclick="openApp('https://www.youtube.com')">YT</div>
            <div class="app-icon" onclick="openApp('https://www.google.com')">WEB</div>
            <div class="app-icon" onclick="openApp('https://music.apple.com')">MUS</div>
            <div class="app-icon" onclick="openApp('https://maps.apple.com')">MAP</div>
        </div>

        <div id="os-dock">
            <div class="app-icon" style="width:70px; height:70px;">⚙️</div>
        </div>

        <div class="window-manager" id="win">
            <div class="win-header" onclick="closeApp()">CERRAR VENTANA</div>
            <iframe id="iframe-app" src="" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <script>
        /* [BLOQUE DE LÓGICA - GESTOR DE ESTADO] */
        const SystemState = {
            activeWindow: null,
            openApp: (url) => {
                const win = document.getElementById('win');
                document.getElementById('iframe-app').src = url;
                win.style.display = 'block';
                SystemState.activeWindow = true;
            },
            closeApp: () => {
                document.getElementById('win').style.display = 'none';
                SystemState.activeWindow = null;
            }
        };

        function openApp(url) { SystemState.openApp(url); }
        function closeApp() { SystemState.closeApp(); }
        
        // Simulación de carga pesada
        console.log("Kernel: Cargando módulos...");
        setTimeout(() => console.log("Kernel: Sistema listo."), 2000);
    </script>
</body>
</html>
