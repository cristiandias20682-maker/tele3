<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS 26 - Liquid Glass</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.2); --blur: blur(25px); }
        body { margin: 0; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif;
               background: linear-gradient(135deg, #007AFF, #5AC8FA); display: flex; flex-direction: column; align-items: center; justify-content: space-between; }

        /* Dynamic Island */
        #dynamic-island { position: absolute; top: 15px; width: 180px; height: 45px; background: black; border-radius: 30px;
                          transition: 0.5s; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 1000; }
        #dynamic-island:hover { width: 350px; height: 120px; border-radius: 40px; }

        /* Escritorio */
        .desktop { display: grid; grid-template-columns: repeat(6, 1fr); gap: 30px; margin-top: 100px; width: 85%; }
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .app:hover { transform: scale(1.15); }
        
        /* Icono con las URLs que pasaste */
        .icon-img { width: 90px; height: 90px; background-size: cover; background-position: center; 
                    border-radius: 22px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .label { color: white; margin-top: 10px; font-weight: 500; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* Dock Liquid Glass */
        .dock { background: var(--glass); backdrop-filter: var(--blur); padding: 15px 30px; border-radius: 40px;
                margin-bottom: 30px; display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.3); }
        .dock-icon { width: 70px; height: 70px; background-size: cover; border-radius: 20px; 
                     cursor: pointer; transition: 0.2s; }
        .dock-icon:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="dynamic-island" onmouseover="this.innerHTML='🎵 <b>YouTube</b> - Reproduciendo'" onmouseout="this.innerHTML=''"></div>

    <div class="desktop">
        <div class="app" onclick="window.open('https://www.youtube.com', '_blank')">
            <div class="icon-img" style="background-image: url('https://e7.pngegg.com/pngimages/125/937/png-clipart-youtube-logo-youtube-angle-logo.png');"></div>
            <div class="label">YouTube</div>
        </div>
        <div class="app" onclick="window.open('https://www.icloud.com/photos', '_blank')">
            <div class="icon-img" style="background-image: url('https://img.icons8.com/color/1200/ios-photos.jpg');"></div>
            <div class="label">Fotos</div>
        </div>
    </div>

    <div class="dock">
        <div class="dock-icon" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/80/Messages_icon.svg');" onclick="window.open('https://messages.google.com', '_blank')"></div>
        <div class="dock-icon" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/a/ad/Safari_icon.svg');" onclick="window.open('https://www.google.com', '_blank')"></div>
    </div>

</body>
</html>
