<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS Clone Pro</title>
    <style>
        :root { --blur: blur(25px); --dock-bg: rgba(255, 255, 255, 0.2); }
        body { 
            margin: 0; height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 50%, #FF2D55 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        /* Dynamic Island */
        #dynamic-island { 
            position: absolute; top: 15px; width: 150px; height: 40px; background: black; border-radius: 25px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 1000;
        }
        #dynamic-island:hover { width: 350px; height: 120px; border-radius: 40px; }

        /* Grid de Apps */
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 30px; margin-top: 100px; width: 80%; }
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.3s; }
        .app:hover { transform: scale(1.15); }
        .icon { width: 80px; height: 80px; border-radius: 20px; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .label { color: white; margin-top: 10px; font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* Dock */
        .dock { 
            background: var(--dock-bg); backdrop-filter: var(--blur); padding: 15px 25px; border-radius: 35px;
            margin-bottom: 20px; display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.2);
        }
        .dock-icon { width: 65px; height: 65px; border-radius: 18px; background: white; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: transform 0.2s;}
        .dock-icon:hover { transform: scale(1.1); }

        /* Modal */
        .modal { 
            display: none; position: fixed; inset: 5%; background: rgba(255,255,255,0.95); backdrop-filter: var(--blur);
            border-radius: 40px; z-index: 2000; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div id="dynamic-island" onmouseover="this.innerHTML='🎵 <b>Reproduciendo Música</b>'" onmouseout="this.innerHTML=''"></div>

    <div class="grid">
        <div class="app" onclick="openApp('YouTube', '#FF0000')"><div class="icon" style="background:#FF0000">▶️</div><div class="label">YouTube</div></div>
        <div class="app" onclick="openApp('Mail', '#007AFF')"><div class="icon" style="background:#007AFF">📧</div><div class="label">Mail</div></div>
        <div class="app" onclick="openApp('Fotos', '#FF2D55')"><div class="icon" style="background:#FF2D55">📸</div><div class="label">Fotos</div></div>
        <div class="app" onclick="openApp('Notas', '#FF9500')"><div class="icon" style="background:#FF9500">📝</div><div class="label">Notas</div></div>
    </div>

    <div class="dock">
        <div class="dock-icon" onclick="openApp('Mensajes', '#4caf50')">💬</div>
        <div class="dock-icon" onclick="openApp('Safari', '#2196f3')">🌐</div>
        <div class="dock-icon" onclick="openApp('Música', '#f44336')">🎵</div>
        <div class="dock-icon" onclick="openApp('Configuración', '#607d8b')">⚙️</div>
    </div>

    <div id="modal" class="modal">
        <button onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
        <h1 id="appName">App</h1>
        <p>Contenido funcional simulado para esta aplicación.</p>
    </div>

    <script>
        function openApp(name, color) {
            const m = document.getElementById('modal');
            m.style.display = 'block';
            document.getElementById('appName').innerText = name;
        }
    </script>
</body>
</html>
