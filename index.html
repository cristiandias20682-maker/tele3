<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* La Isla Dinámica */
        #dynamic-island {
            width: 150px; height: 35px; background: #000; border-radius: 50px;
            margin-top: 10px; border: 1px solid #333; transition: all 0.5s ease;
            display: flex; justify-content: center; align-items: center; font-size: 0.8rem;
        }
        #dynamic-island:hover { width: 300px; height: 100px; } /* Se expande al tocar */

        /* Menú de Apps */
        #app-grid { display: flex; flex-wrap: wrap; justify-content: center; padding-top: 50px; gap: 20px; }
        .icon { width: 60px; height: 60px; background: #222; border-radius: 15px; display: flex; justify-content: center; align-items: center; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="dynamic-island">Conectado</div>

    <div id="app-grid">
        <div class="icon">YT</div>
        <div class="icon">MSG</div>
        <div class="icon">MAP</div>
        <div class="icon">SET</div>
    </div>

    <script>
        // Lógica de la Isla Dinámica: cambia de texto cuando "pasa algo"
        const island = document.getElementById('dynamic-island');
        setTimeout(() => { island.innerText = "Hola, Cristian"; }, 3000);
    </script>
</body>
</html>
