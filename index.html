<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Estilo iOS 26 */
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #000000 0%, #1a1a1a 100%); 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }
        #hello { 
            font-size: 6rem; 
            font-weight: 500; 
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #swipe { 
            position: absolute; bottom: 50px; 
            font-size: 1.1rem; font-weight: 300; opacity: 0.7; 
        }
    </style>
</head>
<body>
    <div id="hello">Hola</div>
    <div id="swipe">Desliza hacia arriba para configurar</div>

    <script>
        const lang = ["Hola", "Hello", "Bonjour", "你好", "Привет"];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % lang.length;
            document.getElementById('hello').innerText = lang[i];
        }, 2500);
    </script>
</body>
</html>
