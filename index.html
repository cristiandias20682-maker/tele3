<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS Pro Interactivo</title>
    <style>
        :root { --blur: blur(20px); }
        body { margin: 0; height: 100vh; background: linear-gradient(135deg, #a8edea, #fed6e3); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        /* Dynamic Island */
        #dynamic-island { position: absolute; top: 10px; width: 120px; height: 35px; background: black; border-radius: 20px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: center; align-items: center; color: white; font-size: 12px; cursor: pointer; }
        #dynamic-island:hover { width: 300px; height: 100px; border-radius: 40px; }

        /* Apps y Animaciones */
        .app-icon { transition: transform 0.3s; cursor: pointer; }
        .app-icon:hover { transform: scale(1.15); }
        
        /* Modal (App abierta) */
        .modal { display: none; position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; background: rgba(255,255,255,0.9); border-radius: 30px; backdrop-filter: var(--blur); padding: 20px; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .close-btn { color: red; cursor: pointer; float: right; font-weight: bold; }
        
        /* Estilos previos (Widgets, Dock, etc.) mantenidos aquí... */
    </style>
</head>
<body>

    <div id="dynamic-island" onmouseover="this.innerText='Reproduciendo: Hits Latinos'" onmouseout="this.innerText=''"></div>

    <div class="app-icon" onclick="openApp('YouTube')">
        <div class="icon-circle" style="background: #ff0000;">▶️</div>YouTube
    </div>

    <div id="appModal" class="modal">
        <span class="close-btn" onclick="document.getElementById('appModal').style.display='none'">Cerrar X</span>
        <h2 id="modalTitle">App</h2>
        <p>Contenido de la aplicación funcional aquí...</p>
    </div>

    <script>
        function openApp(name) {
            document.getElementById('appModal').style.display = 'block';
            document.getElementById('modalTitle').innerText = name;
        }
    </script>
</body>
</html>
