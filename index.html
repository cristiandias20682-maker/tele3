<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS 26 Emulator</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: url('fondo.jpg') center/cover no-repeat; /* Asegúrate que el archivo se llame fondo.jpg */
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Estilo Liquid Glass del Dock */
        .dock {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .icon { width: 65px; height: 65px; cursor: pointer; transition: 0.2s; }
        .icon:hover { transform: translateY(-10px); }
        .icon img { width: 100%; height: 100%; border-radius: 16px; }

        /* Ventanas */
        .window {
            position: absolute; top: 100px; left: 100px; width: 450px; height: 350px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.4);
            display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .header { padding: 12px; cursor: move; background: rgba(0,0,0,0.05); border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="dock">
        <div class="icon" onclick="createWindow('Safari')"><img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg"></div>
        <div class="icon" onclick="createWindow('Fotos')"><img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png"></div>
        <div class="icon" onclick="createWindow('Discord')"><img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png"></div>
    </div>

    <script>
        function createWindow(title) {
            const win = document.createElement('div');
            win.className = 'window';
            win.innerHTML = `<div class="header" onmousedown="drag(this.parentElement)"><span>${title}</span><button onclick="this.parentElement.parentElement.remove()">✕</button></div>
                             <div style="padding:20px;">Contenido funcional de ${title}.</div>`;
            document.body.appendChild(win);
        }

        function drag(elm) {
            let x = 0, y = 0, px = 0, py = 0;
            elm.onmousedown = (e) => { px = e.clientX; py = e.clientY;
                document.onmousemove = (e) => {
                    x = px - e.clientX; y = py - e.clientY; px = e.clientX; py = e.clientY;
                    elm.style.top = (elm.offsetTop - y) + "px"; elm.style.left = (elm.offsetLeft - x) + "px";
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };
        }
    </script>
</body>
</html>
