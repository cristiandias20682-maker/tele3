<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPadOS Clone</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); overflow: hidden; }
        
        /* Contenedor principal */
        .home-screen { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(4, 1fr); height: 85vh; padding: 20px; gap: 15px; }

        /* Widgets (Simulados) */
        .widget { background: rgba(255, 255, 255, 0.7); border-radius: 20px; backdrop-filter: blur(10px); }
        .span-2 { grid-column: span 2; }
        
        /* Iconos de Apps */
        .app-icon { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; }
        .icon-circle { width: 60px; height: 60px; background: white; border-radius: 15px; margin-bottom: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .app-icon:hover { transform: scale(1.1); }

        /* Dock inferior */
        .dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px; }
        .dock-item { width: 50px; height: 50px; background: white; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="home-screen">
        <div class="widget span-2"></div>
        <div class="widget span-2"></div>
        <div class="widget span-2"></div>
        
        <div class="app-icon"><div class="icon-circle" style="background: #00ff00;"></div><span>FaceTime</span></div>
        <div class="app-icon"><div class="icon-circle" style="background: #00aaff;"></div><span>Files</span></div>
    </div>

    <div class="dock">
        <div class="dock-item"></div>
        <div class="dock-item"></div>
        <div class="dock-item"></div>
        <div class="dock-item" style="border-left: 1px solid #ccc; padding-left: 10px;"></div>
    </div>

    <script>
        console.log("Interfaz iPadOS cargada. Puedes añadir lógica de arrastrar y soltar (Drag and Drop) aquí.");
    </script>
</body>
</html>
