<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS Interface</title>
    <style>
        body { 
            margin: 0; 
            /* Fondo solicitado */
            background: url('6d57f2020f35b0201df21df7ffd2a4e7.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        /* Dock Liquid Glass */
        .dock {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 12px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .icon:hover { transform: translateY(-8px); }
    </style>
</head>
<body>

    <div class="dock">
        <!-- Aquí insertarás tus iconos (img src="...") -->
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
    </div>

</body>
</html>
