<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPadOS Clone Pro</title>
    <style>
        :root { --blur: blur(25px); --dock-bg: rgba(255, 255, 255, 0.2); }
        body { margin: 0; height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 50%, #FF2D55 100%); display: flex; flex-direction: column; align-items: center; }
        
        /* Grid de Apps */
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 30px; margin-top: 100px; width: 80%; }
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.3s; }
        .app:hover { transform: scale(1.15); }
        .icon-img { width: 80px; height: 80px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); background-size: cover; background-position: center; background-color: white; }
        .label { color: white; margin-top: 10px; font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* Dock */
        .dock { background: var(--dock-bg); backdrop-filter: var(--blur); padding: 15px 25px; border-radius: 35px; position: absolute; bottom: 20px; display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .dock-img { width: 65px; height: 65px; border-radius: 18px; cursor: pointer; transition: transform 0.2s; background-size: cover; background-position: center; background-color: white; }
        .dock-img:hover { transform: scale(1.1); }

        /* Modal */
        .modal { display: none; position: fixed; inset: 5%; background: white; border-radius: 40px; z-index: 2000; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); overflow-y: auto; }
        .close-btn { padding: 10px 20px; border-radius: 20px; border: none; background: #eee; cursor: pointer; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="app" onclick="openApp('YouTube', 'https://www.youtube.com/')"><div class="icon-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg');"></div><div class="label">YouTube</div></div>
        <div class="app" onclick="openApp('Mail', 'mailto:tu@email.com')"><div class="icon-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/4e/Mail_%28iOS%29.svg');"></div><div class="label">Mail</div></div>
        <div class="app" onclick="openApp('Fotos', '#')"><div class="icon-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/3/36/Photos_iOS_icon.svg');"></div><div class="label">Fotos</div></div>
        <div class="app" onclick="openApp('Notas', '#')"><div class="icon-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/87/Notes_iOS_icon.svg');"></div><div class="label">Notas</div></div>
    </div>

    <div class="dock">
        <div class="dock-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/80/Messages_icon.svg');" onclick="openApp('Mensajes', '#')"></div>
        <div class="dock-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/a/ad/Safari_icon.svg');" onclick="openApp('Safari', '#')"></div>
        <div class="dock-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/19/Music_app_icon.svg');" onclick="openApp('Música', '#')"></div>
        <div class="dock-img" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/6/67/IOS_Settings_icon.svg');" onclick="openApp('Configuración', '#')"></div>
    </div>

    <div id="modal" class="modal">
        <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
        <h1 id="appName">App</h1>
        <div id="appContent">Contenido de la aplicación...</div>
    </div>

    <script>
        function openApp(name, url) {
            const m = document.getElementById('modal');
            m.style.display = 'block';
            document.getElementById('appName').innerText = name;
            if(url !== '#') {
                document.getElementById('appContent').innerHTML = '<iframe src="'+url+'" width="100%" height="500px" frameborder="0"></iframe>';
            } else {
                document.getElementById('appContent').innerHTML = '<p>Interfaz de '+name+' cargada correctamente.</p>';
            }
        }
    </script>
</body>
</html>
