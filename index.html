<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Bienvenida iOS</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #hello-text { font-size: 4rem; opacity: 0; transition: opacity 1s; }
        #swipe-bar { position: absolute; bottom: 40px; font-size: 1.2rem; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <h1 id="hello-text">Hola</h1>
    <div id="swipe-bar" onclick="iniciarConfig()">Desliza hacia arriba para configurar</div>

    <script>
        const saludos = ["Hola", "Hello", "Bonjour", "你好", "Привет", "こんにちは"];
        let i = 0;
        const texto = document.getElementById('hello-text');

        // Animación de bienvenida
        setInterval(() => {
            texto.style.opacity = 0;
            setTimeout(() => {
                texto.innerText = saludos[i];
                texto.style.opacity = 1;
                i = (i + 1) % saludos.length;
            }, 1000);
        }, 2000);

        function iniciarConfig() {
            alert("Iniciando configuración...");
            // Aquí podrías redirigir a tu siguiente página de configuración
            window.location.href = "config.html"; 
        }
    </script>
</body>
</html>
